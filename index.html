<h2>Cere ofertă rapidă</h2>

<div class="card">
  <form action="https://formsubmit.co/Sanduiosifalexandru@gmail.com" method="POST">

    <input type="text" name="nume" placeholder="Nume complet" required 
      style="width:100%; padding:10px; margin-bottom:10px;">

    <input type="tel" name="telefon" placeholder="Telefon" required 
      style="width:100%; padding:10px; margin-bottom:10px;">

    <input type="text" name="localitate" placeholder="Localitate (ex: Craiova)" 
      style="width:100%; padding:10px; margin-bottom:10px;">

    <textarea name="mesaj" placeholder="Descrie proiectul tău" rows="5" required
      style="width:100%; padding:10px; margin-bottom:10px;"></textarea>

    <button type="submit" 
      style="
      background:#0b2d4d;
      color:white;
      padding:12px;
      border:none;
      width:100%;
      font-size:16px;
      cursor:pointer;">
      Trimite cererea
    </button>

    <input type="hidden" name="_captcha" value="false">
  </form>
</div>
